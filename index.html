<script>
// === COUNTDOWN TIMER (15 minutes, resets at 0) ===
(function(){
  let totalSeconds = 15 * 60;
  const topEl = document.getElementById('topCountdown');

  function updateDisplay(){
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;
    topEl.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }

  updateDisplay();
  setInterval(function(){
    totalSeconds--;
    if(totalSeconds < 0) totalSeconds = 15 * 60;
    updateDisplay();
  }, 1000);
})();

// === BALANCE COUNTER (organic growth — ~65.000 Kz em 8 min) ===
(function(){
  let balance = 4500;
  const el = document.getElementById('balanceValue');
  // Target: ~65.000 Kz em 8 min (480s). Need ~60.500 Kz gain.
  // Average ~126 Kz/s. Ticks every 1-3s with jumps of 100-700 Kz.

  function formatKz(val){
    return val.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  }

  el.textContent = formatKz(balance);

  function tick(){
    // Random increment between 100 and 700 Kz
    var increment = 100 + Math.floor(Math.random() * 600);
    balance += increment;
    el.textContent = formatKz(balance);
    // Random delay between 1s and 3s
    var delay = 1000 + Math.floor(Math.random() * 2000);
    setTimeout(tick, delay);
  }
  setTimeout(tick, 2000);
})();

// === ROTATING COMMENTS (fade in/out, 30s cycle) ===
(function(){
  var comments = [
    {name:'Mário K. — Luanda', text:'Isto é real?? Activei ontem e já recebi 38.000 Kz na conta. Estou em choque total 🔥'},
    {name:'Telma F. — Benguela', text:'O meu marido não acreditava até ver o saldo. Agora ele também quer activar o dele 😂'},
    {name:'José M. — Huambo', text:'Já tentei de tudo na internet. Isto é a primeira coisa que realmente funciona. Obrigado ANVY365!'},
    {name:'Cláudia R. — Cabinda', text:'Recebi os primeiros 15.000 Kz em menos de 3 horas. Sem fazer nada. Incrível.'},
    {name:'Nelson A. — Malanje', text:'Não percebo como funciona mas o dinheiro entra. É só isso que me interessa 💰'},
    {name:'Beatriz S. — Luanda', text:'Mostrei à minha irmã e ela ficou maluca. Já activámos as duas. Melhor decisão de sempre.'},
    {name:'Fernando D. — Viana', text:'Acordei com 47.000 Kz que não tinha quando fui dormir. Este bot é de outro mundo.'},
    {name:'Rosa T. — Lubango', text:'Eu duvidei muito antes de activar. Agora arrependo-me de não ter feito mais cedo.'},
    {name:'Paulo G. — Benguela', text:'Com o que ganhei esta semana já paguei a renda e sobrou. Primeira vez em meses.'},
    {name:'Márcia L. — Luanda', text:'Finalmente algo que funciona para nós em Angola. Sem complicações, sem mentiras. Recomendo a 100%.'}
  ];

  var idx = 0;
  var inner = document.getElementById('commentInner');
  var nameEl = document.getElementById('commentName');
  var textEl = document.getElementById('commentText');

  function showComment(){
    var c = comments[idx];
    nameEl.textContent = c.name + ':';
    textEl.textContent = c.text;
    inner.classList.add('visible');

    // fade out after 15s
    setTimeout(function(){
      inner.classList.remove('visible');
    }, 15000);

    idx = (idx + 1) % comments.length;
  }

  // first comment after 5s
  setTimeout(function(){
    showComment();
    setInterval(showComment, 30000);
  }, 5000);
})();

// === BACK REDIRECT ===
(function(){
  sessionStorage.setItem('anvy_step','0');
  // Push extra states so back button triggers popstate
  history.pushState({p:1},null,location.href);
  history.pushState({p:2},null,location.href);
  window.addEventListener('popstate',function(){
    var pages = ['volta1.html','volta2.html','volta3.html','volta4.html'];
    var step = parseInt(sessionStorage.getItem('anvy_step')||'0');
    if(step < pages.length){
      sessionStorage.setItem('anvy_step', step+1);
      location.replace(pages[step]);
    }
  });
})();
</script>
